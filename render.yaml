services:
  # ─── BACK-END (production) ─────────────────────────────
  - type: web
    name: galileo-api
    env: node
    region: frankfurt
    plan: free
    rootDir: ./
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false

  # ─── FRONT-END (production) ────────────────────────────
  - type: web
    name: galileo-frontend
    env: static
    rootDir: ./
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: SERVER_URL
        value: https://galileo-api-vz0u.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html